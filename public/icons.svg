<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions for Gradients -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FDB931;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGoldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#B8860B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6508;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#121212" />
  
  <!-- Subtle Glow -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)" />

  <!-- 3D Book Base (Pages/Side) -->
  <path d="M140 180 L140 380 Q140 400 160 400 L380 400 L380 200 L160 200 Q140 200 140 180" fill="#2A2A2A" stroke="url(#goldGradient)" stroke-width="2"/>
  
  <!-- Pages Stack Effect -->
  <line x1="150" y1="210" x2="370" y2="210" stroke="#333" stroke-width="1" />
  <line x1="150" y1="220" x2="370" y2="220" stroke="#333" stroke-width="1" />
  <line x1="150" y1="230" x2="370" y2="230" stroke="#333" stroke-width="1" />

  <!-- Al-Quran Main Cover (Gold) -->
  <path d="M120 160 L120 360 Q120 385 150 385 L390 360 L390 140 L150 135 Q120 135 120 160" fill="#1A1A1A" stroke="url(#goldGradient)" stroke-width="8"/>
  
  <!-- Decorative Gold Border on Cover -->
  <path d="M140 165 L140 345 Q140 360 160 360 L370 340 L370 160 L160 155 Q140 155 140 165" fill="none" stroke="url(#goldGradient)" stroke-width="2" opacity="0.6"/>

  <!-- Center Medallion (Arabic Style) -->
  <circle cx="255" cy="250" r="45" fill="url(#goldGradient)" />
  <circle cx="255" cy="250" r="38" fill="#1A1A1A" />
  
  <!-- Stylized "Quran" Text/Symbol in Center -->
  <path d="M245 240 Q255 230 265 240 M240 250 L270 250 M245 260 Q255 270 265 260" stroke="url(#goldGradient)" stroke-width="4" stroke-linecap="round" />

  <!-- Corner Decorations -->
  <circle cx="150" cy="165" r="8" fill="url(#goldGradient)" />
  <circle cx="150" cy="335" r="8" fill="url(#goldGradient)" />
  <circle cx="360" cy="165" r="8" fill="url(#goldGradient)" />
  <circle cx="360" cy="330" r="8" fill="url(#goldGradient)" />

  <!-- Spine Shine -->
  <rect x="120" y="160" width="10" height="200" fill="url(#goldGradient)" opacity="0.4" />
</svg>
